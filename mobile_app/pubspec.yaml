name: smart_location_todo
description: A location-based task reminder mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  flutter_local_notifications: ^17.2.2
  provider: ^6.1.2
  http: ^1.2.2
  intl: ^0.19.0
  uuid: ^4.4.2
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1
  geocoding: ^3.0.0
  google_fonts: ^6.2.1
  audioplayers: ^5.2.1
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
